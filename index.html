<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kellie R. Parker</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/97e6807758.js" crossorigin="anonymous"></script>
</head>

<body>

    <section id="about-me">
        <nav>
            <div class="personal__logo">Kellie R. Parker</div>
            <ul class="nav__link--list">
              <li>
                <a href="" class="
                nav__link--anchor
                link__hover-effect
                link__hover-effect--black
                ">Languages</a>
              </li>
              <li>
                <a href="" class="
                nav__link--anchor
                link__hover-effect
                link__hover-effect--black
                ">Project</a>
                </li>
                <li>
                <a href="" class="
                nav__link--anchor
                nav__link--anchor-primary
                ">Contact</a>
                </li>
            </ul>
        </nav>
      <div class="flex flex-1">
        <div class="about-me__info row">
            <div class="about-me__info--container">
                <figure class="about-me__picture--mask">
                    <img src="./assets/wolf2.jpg" class="about-me__picture"alt="Picture of a wolf!">
                </figure>
                <h1 class="about-me__info--title">
                    Hello! I'm <span class="text--purple">Kellie R. Parker</span>
                  </h1>
                  <p class="about-me__info--para">
                    I'm a <strong class="text--purple">student of Frontend Simplified.</strong> I have a strong passion to get back into coding.                
                </p>
                <div class="about-me__links">
                    <a href="" class="about-me__link">
                      <i class="fa-brands fa-linkedin-in"></i>
                    </a>
                    <a href="" class="about-me__link">
                      <i class="fa-brands fa-github"></i>
                     </a>
                     <a href="" class="about-me__link">
                        <i class="fa-solid fa-envelope"></i>
                     </a>
                     <a href="" class="about-me__link">
                       <i class="fa-solid fa-file"></i> 
                     </a>
                </div>
            </div>
            <figure class="about-me__img--container">
                <img src="./assets/undraw_websites.svg" class="about-me__img" alt="">
        </figure>    
       </div>
      </div>
    </section>
<section id="languages">
    <div class="container">
        <div class="row">
            <h1 class="section__title">This is my <span class="text--purple">technology stack</h1>
              <div class="language__list">
                <div class="language">
                    <figure class="language__img--wrapper">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="" class="language__img">
                    </figure>
                        <span class="language__name">HTML</span>
                </div>
              <div class="language">
                    <figure class="language__img--wrapper">
                        <img src="https://cdn.iconscout.com/icon/free/png-256/css-131-722685.png" alt="" class="language__img">
                    </figure>
                    <span class="language__name">CSS</span>
              </div>
              <div class="language">
                    <figure class="language__img--wrapper">
                        <img src="https://cdn.iconscout.com/icon/free/png-256/javascript-1-225993.png" alt="" class="language__img">
                    </figure>
                    <span class="language__name">JavaScript</span>
              </div>
              <div class="language">
                    <figure class="language__img--wrapper">
                        <img src="https://cdn.iconscout.com/icon/free/png-256/typescript-3521774-2945272.png" alt="" class="language__img">
                    </figure>
                    <span class="language__name">TypeScript</span>
              </div>
              <div class="language">
                    <figure class="language__img--wrapper">
                        <img src="https://cdn.iconscout.com/icon/free/png-256/vue-282497.png" alt="" class="language__img">
                    </figure>
                    <span class="language__name">Vue.js</span>
              </div>
              <div class="language">
                    <figure class="language__img--wrapper">
                        <img src="https://cdn.iconscout.com/icon/free/png-256/nuxt-dot-js-3628959-3030184.png" alt="" class="language__img">
                    </figure>
                    <span class="language__name">Nuxt.js</span>
              </div>
              <div class="language">
                    <figure class="language__img--wrapper">
                        <img src="https://cdn.iconscout.com/icon/free/png-256/react-3-1175109.png" alt="" class="language__img">
                    </figure>
                    <span class="language__name">React</span>
              </div>
              <div class="language">
                    <figure class="language__img--wrapper">
                        <img src="https://mobx.js.org/img/mobx.png" alt="" class="language__img">
                    </figure>
                    <span class="language__name">MobX</span>
              </div>
            </div>
        </div>
    </div>
</section>
</body>

</html>
